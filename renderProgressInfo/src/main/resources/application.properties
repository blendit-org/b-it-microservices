spring.application.name=renderProgressInfo

server.port=${PORT:8080}

#spring.datasource.url=jdbc:mysql://10.118.16.2:3306/ongoing-renders?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
# spring.datasource.url=jdbc:mysql://localhost:3309/ongoing-renders?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false

spring.datasource.url=jdbc:mysql:///ongoing-renders
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.hikari.data-source-properties.cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}


## Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

gcs.BucketName=jackfruit-bucket
gcs.ProjectId=blendit-jackfruit

security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=${JWT_EXPIRATION_TIME}

#----------RabbitMQ-------------#
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}

# Listener config (important for manual ack)
spring.rabbitmq.listener.simple.acknowledge-mode=manual

