spring.application.name=projectFileManager

server.port=4000

#spring.datasource.url=jdbc:mysql://10.118.16.2:3306/filemanager?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.url=jdbc:mysql://localhost:3307/filemanager?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

## Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

gcs.BucketName=jackfruit-bucket
gcs.ProjectId=blendit-jackfruit

security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=${JWT_EXPIRATION_TIME}

#----------RabbitMQ-------------#
#spring.rabbitmq.host=34.118.232.11
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Listener config (important for manual ack)
spring.rabbitmq.listener.simple.acknowledge-mode=manual