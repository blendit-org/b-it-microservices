apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-system
  namespace: default
  labels:
    app: scoring-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scoring-system
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: scoring-system
    spec:
      containers:
      - name: scoring-system
        image: gcr.io/blendit-jackfruit/scoring-system:0.0.1
        imagePullPolicy: Always
        env:
        - name: DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: scoring-system-config-5mty
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: scoring-system-config-5mty
              key: DB_PASSWORD
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          capabilities:
            drop:
            - NET_RAW
